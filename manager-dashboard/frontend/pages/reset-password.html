<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля — Manager Dashboard</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🔑 Сброс пароля</h1>
    </div>

    <!-- Steps indicator -->
    <div class="steps" id="steps-indicator">
      <div class="step active" id="step-1-ind">
        <div class="step-circle">1</div>
        <span class="step-label">Email</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step-2-ind">
        <div class="step-circle">2</div>
        <span class="step-label">Код</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step-3-ind">
        <div class="step-circle">3</div>
        <span class="step-label">Новый пароль</span>
      </div>
    </div>

    <div class="alert" id="alert-msg"></div>

    <!-- Step 1: Email -->
    <div id="step-1">
      <h2 class="auth-title" style="margin-bottom:16px">Введите Email</h2>
      <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:20px">
        Мы пришлём код для сброса пароля
      </p>
      <form id="form-email" novalidate>
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" class="form-control" id="reset-email" placeholder="example@company.com">
          <div class="form-error" id="err-email"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Получить код</button>
      </form>
    </div>

    <!-- Step 2: Code -->
    <div id="step-2" style="display:none">
      <h2 class="auth-title" style="margin-bottom:16px">Введите код</h2>
      <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:20px" id="code-hint">
        Код отправлен на <strong id="code-email-display"></strong><br>
        <small>(Для демо — проверьте консоль сервера)</small>
      </p>
      <form id="form-code" novalidate>
        <div class="form-group">
          <label class="form-label">Код подтверждения <span class="required">*</span></label>
          <input type="text" class="form-control" id="reset-code" placeholder="6-значный код"
            maxlength="6" style="letter-spacing:4px;text-align:center;font-size:20px;font-weight:700">
          <div class="form-error" id="err-code"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Подтвердить</button>
      </form>
    </div>

    <!-- Step 3: New password -->
    <div id="step-3" style="display:none">
      <h2 class="auth-title" style="margin-bottom:16px">Новый пароль</h2>
      <form id="form-newpass" novalidate>
        <div class="form-group">
          <label class="form-label">Новый пароль <span class="required">*</span></label>
          <div class="input-password-wrap">
            <input type="password" class="form-control" id="new-password" placeholder="Минимум 6 символов">
            <button type="button" class="password-toggle" id="toggle-np">👁</button>
          </div>
          <div class="form-error" id="err-newpass"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Подтвердите пароль <span class="required">*</span></label>
          <div class="input-password-wrap">
            <input type="password" class="form-control" id="new-password2" placeholder="Повторите пароль">
            <button type="button" class="password-toggle" id="toggle-np2">👁</button>
          </div>
          <div class="form-error" id="err-newpass2"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Сохранить пароль</button>
      </form>
    </div>

    <div class="auth-links" style="margin-top:20px">
      <a href="pages/login.html">← Назад к входу</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/pages/reset-password.js"></script>
</body>
</html>
