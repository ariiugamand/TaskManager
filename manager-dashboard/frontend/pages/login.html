<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Manager Dashboard</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🏢 Manager Dashboard</h1>
      <p>Система управления отделом</p>
    </div>

    <h2 class="auth-title">Вход в систему</h2>

    <div class="alert" id="alert-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label">Логин или Email <span class="required">*</span></label>
        <input type="text" class="form-control" id="identifier" placeholder="Введите логин или email" autocomplete="username">
        <div class="form-error" id="err-identifier"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Пароль <span class="required">*</span></label>
        <div class="input-password-wrap">
          <input type="password" class="form-control" id="password" placeholder="Введите пароль" autocomplete="current-password">
          <button type="button" class="password-toggle" id="toggle-password">👁</button>
        </div>
        <div class="form-error" id="err-password"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" id="btn-login">Войти</button>
    </form>

    <div class="auth-links">
      <a href="pages/reset-password.html">Забыли пароль?</a>
      <span class="divider">•</span>
      <a href="pages/register.html">Регистрация</a>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
